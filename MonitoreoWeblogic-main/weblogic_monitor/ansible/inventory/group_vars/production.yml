---
# Production-specific variables

# Allowed origins (actualizar con tus dominios)
allowed_origins: "https://weblogic-monitor.ejemplo.com"
allowed_hosts: "weblogic-monitor.ejemplo.com"

# SSL Certificates (Let's Encrypt auto-configura esto)
ssl_certificate: "/etc/letsencrypt/live/weblogic-monitor.ejemplo.com/fullchain.pem"
ssl_certificate_key: "/etc/letsencrypt/live/weblogic-monitor.ejemplo.com/privkey.pem"

# Security
enable_rate_limiting: true
max_requests_per_minute: 30

# Workers (más para producción)
uvicorn_workers: 4

# Monitoring
enable_monitoring: true
