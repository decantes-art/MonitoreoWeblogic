# Development Inventory for WebLogic Monitor

[dashboard_servers]
weblogic-monitor-dev ansible_host=192.168.1.200 ansible_user=oracle

[dashboard_servers:vars]
environment=development
install_dir=/opt/weblogic-monitor
frontend_dir=/var/www/weblogic-monitor
secure_dir=/secure/weblogic-monitor
use_secure_version=false
enable_https=false

