# Production Inventory for WebLogic Monitor
# Actualizar con tus servidores reales

[dashboard_servers]
weblogic-monitor-prod ansible_host=192.168.1.100 ansible_user=oracle

[dashboard_servers:vars]
environment=production
install_dir=/opt/weblogic-monitor
frontend_dir=/var/www/weblogic-monitor
secure_dir=/secure/weblogic-monitor
use_secure_version=true
enable_https=true
letsencrypt_email=admin@ejemplo.com

# WebLogic Domains (opcional, para validación)
[weblogic_domains]
# Agregar tus dominios aquí si quieres validar conectividad
# wls-prod-admin01 ansible_host=10.1.1.10 ansible_user=oracle
# wls-prod-admin02 ansible_host=10.1.1.11 ansible_user=oracle
